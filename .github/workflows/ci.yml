name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  backend:
    name: Backend lint and tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-secret-key
      SMTP_HOST: localhost
      SMTP_PORT: "1025"
      SMTP_USER: ci@example.com
      SMTP_PASSWORD: ci
      SMTP_FROM: ci@example.com
      CORS_ORIGINS: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check backend/app backend/tests

      - name: Black
        run: python -m black --check backend/app backend/tests

      - name: Pytest
        working-directory: backend
        run: python -m pytest tests/ -q

      - name: Alembic heads
        working-directory: backend
        run: python -m alembic heads

  flutter:
    name: Flutter analyze and tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: mobile_app
        run: flutter pub get

      - name: Dart format
        run: dart format --set-exit-if-changed mobile_app/lib mobile_app/test

      - name: Flutter analyze
        working-directory: mobile_app
        run: flutter analyze --no-fatal-infos

      - name: Flutter tests
        working-directory: mobile_app
        run: flutter test

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install security tooling
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Bandit
        run: python -m bandit -r backend/app -x backend/tests
